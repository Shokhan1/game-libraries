<body>

<header>
    <div class="menu container">
        <div class="logo"><h1>GL<span>.</span></h1></div>
        <nav>
            <ul>
                <li><a href="index.html" class=""><i class="fa-solid fa-gamepad"></i> Каталог</a></li>

        </nav>
        <div class="icons">

                    <input type="text" id="searchInput" placeholder="Поиск по названию или ID...">

</nav>

<main class="container">
    <section class="game-main-info">
        <div class="info-text">
            <h1 id="title"></h1>
            <p id="description"></p> 
            <div class="tags">
                <span class="tag">Экшен</span>
                <span class="tag">RPG</span>

        <div class="game-poster-large">
            <img id="image" src="" alt="" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;">

    </section>

    <section class="screenshots">
        <h2>скриншоты</h2>

            </div>
